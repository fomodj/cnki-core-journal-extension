<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>核心期刊多库标注</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f1117;
    color: #e8eaf0;
    font-size: 13px;
  }

  /* ── 顶部标题 ── */
  .header {
    background: linear-gradient(135deg, #1a1f35 0%, #0f1117 100%);
    padding: 14px 16px 12px;
    border-bottom: 1px solid #1e2440;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, #3b82f6, #1e3a8a);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .header-text h1 { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 1px; }
  .header-text p  { font-size: 11px; color: #64748b; }

  /* ── 4宫格统计 ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px dashed #1e2440;
  }
  .stat-item {
    background: #151828;
    border-radius: 7px;
    padding: 8px 4px;
    text-align: center;
  }
  .stat-num   { font-size: 17px; font-weight: 700; font-family: ui-monospace, monospace; margin-bottom: 2px; }
  .stat-label { font-size: 10px; color: #64748b; }
  .c-cssci { color: #60a5fa; }
  .c-pku   { color: #fb923c; }
  .c-ami   { color: #2dd4bf; }
  .c-nssf  { color: #fbbf24; }

  /* ── 数据集筛选区 ── */
  .filter-section {
    padding: 12px 14px;
    border-bottom: 1px dashed #1e2440;
  }
  .filter-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .filter-title {
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .btn-all {
    font-size: 10px;
    color: #60a5fa;
    cursor: pointer;
    background: none;
    border: none;
    padding: 2px 6px;
    border-radius: 4px;
    transition: background .15s;
  }
  .btn-all:hover { background: #1e2440; }

  /* 分组 */
  .cat-group {
    margin-bottom: 9px;
  }
  .cat-group:last-child { margin-bottom: 0; }

  .cat-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .cat-group-name {
    font-size: 11px;
    font-weight: 600;
    color: #cbd5e1;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .cat-group-name::before {
    content: '';
    display: inline-block;
    width: 3px; height: 11px;
    border-radius: 2px;
    background: var(--grp-color, #475569);
    flex-shrink: 0;
  }
  .grp-toggle-all {
    font-size: 10px;
    color: #475569;
    cursor: pointer;
    background: none;
    border: none;
    padding: 1px 5px;
    border-radius: 3px;
    transition: color .15s, background .15s;
  }
  .grp-toggle-all:hover { color: #94a3b8; background: #1e2440; }

  /* 药丸开关 */
  .pill-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .pill-toggle {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: opacity .15s, filter .15s;
    border: 1px solid transparent;
    line-height: 17px;
    position: relative;
  }
  .pill-toggle input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }
  /* 禁用状态：灰化 */
  .pill-toggle.disabled {
    filter: grayscale(1);
    opacity: 0.35;
  }
  .pill-toggle:hover { opacity: 0.85; }

  /* ── 状态栏 ── */
  .status {
    background: #0b0e1a;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid #1e2440;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 7px rgba(34,197,94,0.6);
    flex-shrink: 0;
  }
  .status-dot.off { background: #334155; box-shadow: none; }
  .status-text { font-size: 11px; color: #64748b; }
  .footer {
    padding: 7px 14px;
    font-size: 10px;
    color: #1e293b;
    text-align: center;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📚</div>
  <div class="header-text">
    <h1>全核心期刊多库标注</h1>
    <p>CSSCI · 北大核心 · AMI · 国家社科基金</p>
  </div>
</div>

<div class="stats">
  <div class="stat-item">
    <div class="stat-num c-cssci" id="n-cssci">—</div>
    <div class="stat-label">CSSCI</div>
  </div>
  <div class="stat-item">
    <div class="stat-num c-pku" id="n-pku">—</div>
    <div class="stat-label">北大核心</div>
  </div>
  <div class="stat-item">
    <div class="stat-num c-ami" id="n-ami">—</div>
    <div class="stat-label">AMI</div>
  </div>
  <div class="stat-item">
    <div class="stat-num c-nssf" id="n-nssf">—</div>
    <div class="stat-label">社科基金</div>
  </div>
</div>

<!-- 数据集筛选区：由 popup.js 动态生成 -->
<div class="filter-section">
  <div class="filter-header">
    <span class="filter-title">显示数据集</span>
    <button class="btn-all" id="btn-enable-all">全部开启</button>
  </div>
  <div id="filter-body"></div>
</div>

<div class="status">
  <div class="status-dot off" id="status-dot"></div>
  <div class="status-text" id="status-text">初始化中…</div>
</div>
<div class="footer">Local Database Match Engine V5.0 · core_plugin_data.json</div>

<script src="popup.js"></script>
</body>
</html>
